version: "3.9"

services:

  coordinator:
    build:
      context: .
      dockerfile: coordinator/Dockerfile
    container_name: search-coordinator
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/nodes"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - search-net

  node-1:
    build:
      context: .
      dockerfile: datanode/Dockerfile
    container_name: search-node-1
    environment:
      NODE_ID: node-1
      NODE_PORT: 8081
      NODE_STORAGE_ROOT: /data/node-1
      COORDINATOR_URL: http://coordinator:8080
    ports:
      - "8081:8081"
    volumes:
      - node1-data:/data/node-1
    depends_on:
      coordinator:
        condition: service_healthy
    networks:
      - search-net

  node-2:
    build:
      context: .
      dockerfile: datanode/Dockerfile
    container_name: search-node-2
    environment:
      NODE_ID: node-2
      NODE_PORT: 8082
      NODE_STORAGE_ROOT: /data/node-2
      COORDINATOR_URL: http://coordinator:8080
    ports:
      - "8082:8082"
    volumes:
      - node2-data:/data/node-2
    depends_on:
      coordinator:
        condition: service_healthy
    networks:
      - search-net

volumes:
  node1-data:
  node2-data:

networks:
  search-net:
    driver: bridge
